  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    html,body{

      margin:0;
      padding:0;

    }

    .banner-wrap{
      position:relative;
      width:100%;
      max-width:480px;
      margin:0 auto;
      background:#F7F5F2;
    }

    .main-banner{
      display:block;
      width:100%;
      height:auto;
    }

    /* ── Верх: невидимая кликабельная зона поверх нарисованной кнопки ── */
    .top-link-area{
      position:absolute;
      top:2.6%;
      right:4%;
      width:42%;
      height:7%;
      z-index:30;
      display:block;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    /* ── Низ: PNG-кнопка с анимацией ── */
    .bottom-max-btn{
      display:block;
      position:absolute;
      left:4%;
      bottom:1%;
      width:92%;
      z-index:30;
      background:transparent !important;
      border:none;
      padding:0;
      margin:0;
      text-decoration:none;
      -webkit-tap-highlight-color:transparent;
    }

    .max-btn-img{
      display:block;
      width:100%;
      height:auto;
      background:transparent !important;
      animation:breathe 2.6s ease-in-out infinite;
      transform-origin:center;
    }

    @keyframes breathe{
      0%,100%{transform:scale(1)}
      50%     {transform:scale(1.025)}
    }

    @media(hover:hover){
      .bottom-max-btn:hover .max-btn-img{
        animation:none;
        transform:scale(1.04);
        transition:transform .2s ease;
      }
    }

    .bottom-max-btn:active .max-btn-img{
      animation:none;
      transform:scale(0.96);
      transition:transform .1s ease;
    }
